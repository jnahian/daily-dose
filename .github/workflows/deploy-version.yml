name: Deploy Version Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Validate tag format
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [[ ! $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format: $TAG_NAME"
            echo "Expected format: v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "✅ Valid SemVer tag: $TAG_NAME"

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify package.json version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "package.json version: $PACKAGE_VERSION"
            echo "Git tag version: $TAG_VERSION"
            exit 1
          fi

          echo "✅ Versions match: $PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      # url: http://${{ secrets.VPS_HOST }}:${{ secrets.APP_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "🚀 Deploying Daily Dose ${{ steps.version.outputs.tag }}..."

            # Navigate to app directory
            cd /var/www/html/daily-dose/

            # Stop the application
            pm2 stop DAILY_DOSE_BOT || echo "App not running"

            # Fetch all tags and checkout the specific version
            git fetch --all --tags
            git checkout tags/${{ steps.version.outputs.tag }} -b release-${{ steps.version.outputs.version }} || git checkout release-${{ steps.version.outputs.version }}

            # Install dependencies
            npm ci --production

            # Generate Prisma client
            npx prisma generate

            # Run database migrations
            npx prisma db push

            # Build React app
            cd web
            npm ci
            npm run build
            cd ..

            # Check if manifest-related files have changed
            echo "🔍 Checking for manifest-related changes..."
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.version.outputs.tag }}^ 2>/dev/null || echo "")

            if [ -z "$PREV_TAG" ]; then
              echo "No previous tag found, will update manifest"
              MANIFEST_CHANGED=true
            else
              echo "Comparing changes between $PREV_TAG and ${{ steps.version.outputs.tag }}"
              CHANGED_FILES=$(git diff --name-only $PREV_TAG ${{ steps.version.outputs.tag }} | grep -E '(src/commands/|scripts/updateSlackManifest\.js|src/app\.js)' || true)

              if [ -n "$CHANGED_FILES" ]; then
                echo "📋 Manifest-related files changed:"
                echo "$CHANGED_FILES"
                MANIFEST_CHANGED=true
              else
                echo "✅ No manifest-related changes detected, skipping manifest update"
                MANIFEST_CHANGED=false
              fi
            fi

            # Update Slack app manifest if needed
            if [ "$MANIFEST_CHANGED" = true ]; then
              echo "📋 Updating Slack app manifest..."
              node scripts/updateSlackManifest.js || echo "⚠️ Manifest update failed, continuing deployment..."
            fi

            # Start/restart the application with PM2
            pm2 start ecosystem.config.js --env production || pm2 restart DAILY_DOSE_BOT

            # Save PM2 configuration
            pm2 save

            echo "✅ Deployment of version ${{ steps.version.outputs.tag }} completed successfully!"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for application startup
        run: sleep 30

      - name: Check application health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:${{ secrets.APP_PORT }}/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Application is healthy"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

      - name: Verify deployment
        if: success()
        run: |
          echo "✅ Version ${{ needs.deploy.outputs.version }} deployed successfully!"

  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [validate, deploy, health-check]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ] && [ "${{ needs.health-check.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Deployment successful" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Extract version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "${{ steps.status.outputs.emoji }} Deployment Status: ${{ steps.status.outputs.message }}"
          echo "Version: ${{ steps.version.outputs.tag }}"
          echo "Environment: Production"
          echo ""
          echo "Job Results:"
          echo "- Validate: ${{ needs.validate.result }}"
          echo "- Deploy: ${{ needs.deploy.result }}"
          echo "- Health Check: ${{ needs.health-check.result }}"
